<!DOCTYPE html>
<html>
<head>
    <title>Test Demo Login</title>
</head>
<body>
    <h1>Test Demo Login</h1>
    <button onclick="testDemoLogin()">Test Demo Login</button>
    <button onclick="testMe()">Test /me endpoint</button>
    <div id="result"></div>

    <script>
        let token = null;

        async function testDemoLogin() {
            try {
                const response = await fetch('http://127.0.0.1:5000/auth/demo', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                console.log('Demo login response:', data);
                
                if (data.token) {
                    token = data.token;
                    document.getElementById('result').innerHTML = `
                        <h3>Demo Login Success!</h3>
                        <p>Token: ${data.token.substring(0, 50)}...</p>
                    `;
                } else {
                    document.getElementById('result').innerHTML = `
                        <h3>Demo Login Failed</h3>
                        <p>Error: ${JSON.stringify(data)}</p>
                    `;
                }
            } catch (error) {
                console.error('Demo login error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>Demo Login Error</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }

        async function testMe() {
            if (!token) {
                alert('Please login first');
                return;
            }

            try {
                const response = await fetch('http://127.0.0.1:5000/me', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    }
                });
                
                const data = await response.json();
                console.log('/me response:', data);
                
                document.getElementById('result').innerHTML = `
                    <h3>/me Endpoint Success!</h3>
                    <pre>${JSON.stringify(data, null, 2)}</pre>
                `;
            } catch (error) {
                console.error('/me error:', error);
                document.getElementById('result').innerHTML = `
                    <h3>/me Endpoint Error</h3>
                    <p>Error: ${error.message}</p>
                `;
            }
        }
    </script>
</body>
</html>
