services:
  # Backend API
  - type: web
    name: jobmarket-ai-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn api.index:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: MONGO_URI
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: JWT_SECRET
        generateValue: true

# Separate key for Static Sites in Render Blueprints
static_sites:
  - name: jobmarket-ai-web
    env: static
    buildCommand: npm install && npm run build
    staticPublishDir: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: jobmarket-ai-api
          type: web
          property: url
      - key: VITE_GOOGLE_CLIENT_ID
        sync: false
